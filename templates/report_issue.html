<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Civic Pulse</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div class="dashboard-container">
        
   <nav class="sidebar">
    <div class="logo"><h2>Civic Pulse</h2></div>
    <ul class="menu">
        
        <li class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">
            <a href="{{ url_for('dashboard') }}"><i class="fas fa-th-large"></i> Dashboard</a>
        </li>

        <li class="{{ 'active' if request.endpoint == 'report_issue' else '' }}">
            <a href="{{ url_for('report_issue') }}"><i class="fas fa-pen-fancy"></i> Report Issue</a>
        </li>

        <li class="{{ 'active' if request.endpoint == 'my_complaints' else '' }}">
            <a href="{{ url_for('my_complaints') }}"><i class="fas fa-file-alt"></i> My Complaints</a>
        </li>

        <li class="{{ 'active' if request.endpoint == 'profile' else '' }}">
            <a href="{{ url_for('profile') }}"><i class="fas fa-user"></i> Profile</a>
        </li>

       <li class="{{ 'active' if request.endpoint == 'about' else '' }}">
    <a href="{{ url_for('about') }}"><i class="fas fa-info-circle"></i> About Us</a>
</li>

        <li class="logout">
            <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </li>
    </ul>
</nav>
        <main class="main-content">
            <header>
                <div class="welcome-text">
                    <h1>Submit a Report 📢</h1>
                    <p>Select a category and pin the location on the map.</p>
                </div>
                <div class="header-actions">
                    <div class="points-badge"><i class="fas fa-coins"></i> {{ user.points }} Points</div>
                </div>
            </header>

            <form action="/report-issue" method="POST" enctype="multipart/form-data" class="report-form-wrapper">
                
                <section class="form-section">
                    <h3><i class="fas fa-th-large"></i> Select Issue Category</h3>
                    <div class="category-grid">
                        
                        <input type="radio" name="category" id="cat-pothole" value="Pothole" checked>
                        <label for="cat-pothole" class="cat-card">
                            <div class="icon-circle brown"><i class="fas fa-road"></i></div>
                            <span>Pothole</span>
                        </label>

                        <input type="radio" name="category" id="cat-garbage" value="Garbage">
                        <label for="cat-garbage" class="cat-card">
                            <div class="icon-circle green"><i class="fas fa-trash-alt"></i></div>
                            <span>Garbage</span>
                        </label>

                        <input type="radio" name="category" id="cat-water" value="Water Leak">
                        <label for="cat-water" class="cat-card">
                            <div class="icon-circle blue"><i class="fas fa-tint"></i></div>
                            <span>Water Leak</span>
                        </label>

                        <input type="radio" name="category" id="cat-light" value="Street Light">
                        <label for="cat-light" class="cat-card">
                            <div class="icon-circle yellow"><i class="fas fa-lightbulb"></i></div>
                            <span>Street Light</span>
                        </label>

                        <input type="radio" name="category" id="cat-drainage" value="Drainage">
                        <label for="cat-drainage" class="cat-card">
                            <div class="icon-circle teal"><i class="fas fa-water"></i></div>
                            <span>Drainage</span>
                        </label>

                        <input type="radio" name="category" id="cat-other" value="Other">
                        <label for="cat-other" class="cat-card">
                            <div class="icon-circle purple"><i class="fas fa-question"></i></div>
                            <span>Other</span>
                        </label>

                    </div>
                </section>

                <section class="form-section">
                    <h3><i class="fas fa-pen"></i> Issue Details</h3>
                    <div class="form-row">
                        <div class="form-group half">
                            <label>Issue Title</label>
                            <input type="text" name="title" placeholder="e.g. Broken Pipe at Main St" required>
                        </div>
                        <div class="form-group half">
                            <label>Priority</label>
                            <div class="priority-options">
                                <input type="radio" id="p-high" name="priority" value="High">
                                <label for="p-high" class="p-btn high">High</label>
                                <input type="radio" id="p-medium" name="priority" value="Medium" checked>
                                <label for="p-medium" class="p-btn medium">Medium</label>
                                <input type="radio" id="p-low" name="priority" value="Low">
                                <label for="p-low" class="p-btn low">Low</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="3" placeholder="Provide more details or Address ...." required></textarea>
                    </div>
                </section>

                <section class="form-section">
                    <h3><i class="fas fa-camera"></i> Upload Evidence</h3>
                    <div class="file-upload-wrapper">
                        <input type="file" name="image" id="fileInput" accept="image/*" onchange="previewImage(event)">
                        <label for="fileInput" class="file-label">
                            <i class="fas fa-cloud-upload-alt"></i> Drag & Drop or Click to Upload
                        </label>
                    </div>
                    <div id="previewContainer" style="display:none; margin-top:10px;">
                        <img id="previewImg" style="height:150px; border-radius:10px;">
                    </div>
                </section>

                <section class="form-section">
                    <h3><i class="fas fa-map-marker-alt"></i> Pin Location</h3>
                    <div class="map-wrapper">
                        <div id="reportMap"></div>
                        <div class="map-controls">
                            <button type="button" class="gps-btn" onclick="getMyLocation()"><i class="fas fa-crosshairs"></i> Locate Me</button>
                            <input type="text" name="address" id="addressInput" placeholder="Selected Address..." required readonly>
                        </div>
                    </div>
                    <input type="hidden" name="latitude" id="latField">
                    <input type="hidden" name="longitude" id="lngField">
                </section>

                <button type="submit" class="submit-btn-full">Submit Report to Authorities</button>
            </form>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/report.js') }}"></script>
</body>
</html>
